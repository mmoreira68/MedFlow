{% extends 'base.html' %}
{% load static %}

{% block title %}Entrar — OdontoFlow{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 120px);padding:24px 16px;">

  <div class="split-layout w-100">

    <!-- Lado da imagem -->
    <div class="split-layout__image">
      <div style="text-align:center;">
        <img src="{% static 'image/logo_medflow.jpeg' %}" alt="OdontoFlow" style="max-height:160px;max-width:100%;border-radius:12px;box-shadow:0 4px 16px rgba(30,64,175,.15);">
        <p style="margin-top:16px;font-size:13px;color:var(--color-text-secondary);font-weight:500;">
          Gestão de Salas Odontológicas
        </p>
      </div>
    </div>

    <!-- Lado do formulário -->
    <div class="split-layout__body">
      <h2 style="margin-bottom:6px;">Acesso ao Sistema</h2>
      <p class="text-muted text-sm" style="margin-bottom:24px;">Entre com suas credenciais para continuar.</p>

      {% if error %}
        <div class="alert alert-danger alert-dismissible" role="alert"
             style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px;">
          <span><i data-lucide="alert-circle" width="15" height="15"></i> {{ error }}</span>
          <button type="button" data-dismiss="alert" aria-label="Fechar"
                  style="background:none;border:none;cursor:pointer;padding:0;opacity:.6;">
            <i data-lucide="x" width="15" height="15" style="margin:0;"></i>
          </button>
        </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-3">
          <label for="email" class="form-label">E-mail / Usuário</label>
          <input type="text" name="email" id="email" class="form-control"
                 placeholder="seu@email.com" required autocomplete="username"
                 value="{{ request.POST.email|default:'' }}">
        </div>

        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" name="senha" id="senha" class="form-control"
                 placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100" style="margin-top:8px;">
          <i data-lucide="log-in" width="16" height="16"></i> Entrar
        </button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
